{% extends "base.html" %}
{% block title %}EduPredict — Error{% endblock %}

{% block content %}
<section class="error-section d-flex align-items-center justify-content-center">
  <div class="container text-center">
    <div class="error-icon"><i class="bi bi-exclamation-triangle-fill"></i></div>
    <h2 class="error-title">Oops! Something went wrong.</h2>
    <p class="error-msg">{{ message }}</p>
    <a href="{{ url_for('home') }}" class="btn btn-primary-custom mt-3">
      <i class="bi bi-house me-2"></i>Back to Home
    </a>
  </div>
</section>
{% endblock %}
